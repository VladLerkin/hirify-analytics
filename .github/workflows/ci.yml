name: Unified CI

on:
  push:
    branches: [ main, develop ]
    tags-ignore:
      - 'v*'
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - '.gitignore'
      - 'LICENSE'
  pull_request:
    branches: [ main, develop ]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - '.gitignore'
      - 'LICENSE'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Android Builds
  build-android:
    if: "!startsWith(github.event.head_commit.message, 'Release v')"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: 'gradle'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      
      - name: Build Android Debug APK
        run: ./gradlew :app-android:assembleDebug --stacktrace
      
      - name: Setup and Build Android Release
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::warning::No KEYSTORE_BASE64 found. Using DUMMY mode for testing."
            export RELEASE_STORE_PASSWORD="android123"
            export RELEASE_KEY_ALIAS="release"
            export RELEASE_KEY_PASSWORD="android123"
            
            keytool -genkey -v -keystore app-android/release.keystore \
              -alias "$RELEASE_KEY_ALIAS" \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass "$RELEASE_STORE_PASSWORD" \
              -keypass "$RELEASE_KEY_PASSWORD" \
              -dname "CN=Dummy, OU=Dummy, O=Dummy, L=Dummy, ST=Dummy, C=US"
          else
            echo "KEYSTORE_BASE64 found. Decoding..."
            printf '%s' "$KEYSTORE_BASE64" | base64 -di > app-android/release.keystore
          fi
          
          ./gradlew :app-android:assembleRelease --stacktrace
        continue-on-error: true
      
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: app-android/build/outputs/apk/debug/*.apk
          retention-days: 7
      
      - name: Run Android Tests
        run: ./gradlew :app-android:testDebugUnitTest --stacktrace
        continue-on-error: true
  
  # Desktop builds for Linux, macOS, and Windows
  build-desktop:
    if: "!startsWith(github.event.head_commit.message, 'Release v')"
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            artifact-name: linux-desktop
            task: packageReleaseDeb
          - os: macos-latest
            artifact-name: macos-desktop
            task: packageReleaseDmg
          - os: windows-latest
            artifact-name: windows-desktop
            task: packageReleaseMsi
    
    runs-on: ${{ matrix.os }}
    name: Build Desktop (${{ matrix.os }})
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: 'gradle'
      
      - name: Grant execute permission for gradlew (Unix)
        if: runner.os != 'Windows'
        run: chmod +x gradlew
      
      - name: Build Desktop Application
        run: ./gradlew :app-desktop:build --stacktrace
        shell: bash
      
      - name: Create distribution package
        run: ./gradlew :app-desktop:${{ matrix.task }} --stacktrace
        continue-on-error: true
        shell: bash
      
      - name: Upload desktop build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: |
            app-desktop/build/compose/binaries/main-release/**
            app-desktop/build/libs/**
          retention-days: 7
  
  # iOS Build (Framework and Simulator App)
  build-ios:
    if: "!startsWith(github.event.head_commit.message, 'Release v')"
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: 'gradle'
      
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      
      - name: Set correct JAVA_HOME for Xcode
        run: |
          JAVA_HOME_PATH=$(/usr/libexec/java_home -v 25)
          echo "JAVA_HOME=$JAVA_HOME_PATH" >> $GITHUB_ENV
      
      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
      
      - name: Build iOS Framework (Simulator Arm64)
        run: ./gradlew :app-ios:linkDebugFrameworkIosSimulatorArm64 --stacktrace
      
      - name: Build iOS App for Simulator
        working-directory: iosApp
        run: |
          xcodebuild -project iosApp.xcodeproj \
            -scheme iosApp \
            -sdk iphonesimulator \
            -configuration Debug \
            -derivedDataPath build \
            build
      
      - name: Upload iOS App Build
        uses: actions/upload-artifact@v4
        with:
          name: ios-app-simulator
          path: iosApp/build/Build/Products/Debug-iphonesimulator/*.app
          retention-days: 7
